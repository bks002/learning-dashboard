services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Cors__AllowedOrigins__0: http://localhost:8080
      Jwt__Key: DevelopmentOnlyKey_ChangeInProduction_Min32Chars!
    volumes:
      - api-data:/app/Data

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  api-data:
